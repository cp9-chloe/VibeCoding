<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocky Survival</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      margin: 0;
      background: #181c2a;
      color: #f5f5f5;
      display: grid;
      place-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 3px solid #7a5c2b;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      background: #7cc7ff;
      image-rendering: pixelated;
      cursor: crosshair;
    }
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
      box-sizing: border-box;
    }
    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .panel {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 10px;
      border-radius: 8px;
      min-width: 180px;
    }
    .bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.18);
      margin-top: 4px;
    }
    .bar > div {
      height: 100%;
      width: 100%;
      transition: width 0.2s ease;
    }
    .health { background: linear-gradient(90deg, #ff4d4d, #ff7d7d); }
    .hunger { background: linear-gradient(90deg, #e0b95b, #f7da7a); }
    .hotbar {
      display: flex;
      gap: 6px;
      align-self: center;
      background: rgba(0,0,0,0.55);
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .slot {
      width: 44px;
      height: 44px;
      border: 2px solid #7a5c2b;
      background: rgba(255,255,255,0.1);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: bold;
      position: relative;
      text-transform: capitalize;
    }
    .slot.selected {
      border-color: #ffd76f;
      box-shadow: 0 0 10px rgba(255,215,111,0.6);
    }
    .slot .count {
      position: absolute;
      right: 2px;
      bottom: 2px;
      font-size: 11px;
      color: #fff;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0,0,0,0.7);
    }
    .overlay.show { display: grid; }
    .popup {
      background: #2a241c;
      border: 2px solid #7a5c2b;
      border-radius: 12px;
      padding: 16px;
      min-width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    button {
      background: #5b3d1a;
      color: white;
      border: 1px solid #c78b3b;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #7a5322; }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="540"></canvas>
  <div class="hud">
    <div class="topbar">
      <div class="panel">
        <div>Health</div>
        <div class="bar"><div class="health" id="healthBar"></div></div>
      </div>
      <div class="panel">
        <div>Hunger</div>
        <div class="bar"><div class="hunger" id="hungerBar"></div></div>
      </div>
      <div class="panel" id="statusText">Daytime • Gather, build, survive</div>
    </div>
    <div class="hotbar" id="hotbar"></div>
  </div>
  <div class="overlay" id="craftOverlay">
    <div class="popup">
      <h3>Crafting Table</h3>
      <p>Craft planks or a crafting table.</p>
      <button id="craftPlanksBtn">Craft 4 Planks</button>
      <button id="craftTableBtn">Craft Crafting Table</button>
      <button id="closeCraftBtn">Close</button>
    </div>
  </div>
  <div class="overlay show" id="startOverlay">
    <div class="popup">
      <h3>Blocky Survival</h3>
      <p>WASD to move, Space to jump, left click to break or attack, right click to place, 1-8 to change blocks, E to eat meat, F to use crafting table.</p>
      <button id="startBtn">Start Adventure</button>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hotbarEl = document.getElementById('hotbar');
    const statusEl = document.getElementById('statusText');
    const healthBar = document.getElementById('healthBar');
    const hungerBar = document.getElementById('hungerBar');
    const craftOverlay = document.getElementById('craftOverlay');
    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');
    const craftPlanksBtn = document.getElementById('craftPlanksBtn');
    const craftTableBtn = document.getElementById('craftTableBtn');
    const closeCraftBtn = document.getElementById('closeCraftBtn');

    const TILE = 24;
    const WORLD_W = 140;
    const WORLD_H = 60;
    const DAY_LENGTH = 120;

    const world = Array.from({ length: WORLD_H }, () => Array(WORLD_W).fill('air'));
    const solidTypes = new Set(['grass', 'dirt', 'stone', 'wood', 'crafting_table']);
    const breakableTypes = new Set(['grass', 'dirt', 'stone', 'wood', 'leaves']);

    const hotbarItems = [
      { id: 'dirt', label: 'Dirt', count: 24 },
      { id: 'stone', label: 'Stone', count: 18 },
      { id: 'wood', label: 'Wood', count: 8 },
      { id: 'crafting_table', label: 'Crafting', count: 0 },
      { id: 'planks', label: 'Planks', count: 0 },
      { id: 'leaves', label: 'Leaves', count: 0 },
    ];
    let selectedIndex = 0;

    const keys = {};
    const cameraKeys = { left: false, right: false, up: false, down: false };
    let mouse = { x: 0, y: 0, down: false, rightDown: false, lastClick: 0 };
    let lastTime = 0;
    let time = 0;
    let hungerTimer = 0;
    let hungerDamageTimer = 0;
    let attackCooldown = 0;
    let eatCooldown = 0;
    let gameStarted = false;
    let craftingNear = false;

    const player = {
      x: 12 * TILE,
      y: 0,
      w: 18,
      h: 40,
      vx: 0,
      vy: 0,
      onGround: false,
      health: 10,
      hunger: 100,
      meat: 0,
    };

    const animals = [];
    const mobs = [];
    let camera = { x: 0, y: 0 };
    let cameraOffset = { x: 0, y: 0 };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function setBlock(x, y, type) {
      if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return;
      world[y][x] = type;
    }

    function getBlock(x, y) {
      if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return 'void';
      return world[y][x];
    }

    function isSolid(type) {
      return solidTypes.has(type);
    }

    function generateWorld() {
      for (let x = 0; x < WORLD_W; x++) {
        for (let y = WORLD_H - 12; y < WORLD_H; y++) {
          setBlock(x, y, 'stone');
        }
        for (let y = WORLD_H - 11; y < WORLD_H; y++) {
          if (Math.random() < 0.08) {
            setBlock(x, y, 'dirt');
          }
        }
        setBlock(x, WORLD_H - 10, 'grass');
        setBlock(x, WORLD_H - 9, 'dirt');
      }

      for (let x = 0; x < WORLD_W; x++) {
        if (Math.random() < 0.02) {
          for (let y = WORLD_H - 12; y < WORLD_H - 8; y++) {
            setBlock(x, y, 'stone');
          }
        }
      }

      const treePositions = [16, 30, 44, 60, 78, 92, 108, 124];
      for (const treeX of treePositions) {
        createTree(treeX, WORLD_H - 11);
      }

      for (let i = 0; i < 5; i++) {
        const x = 8 + Math.floor(Math.random() * 30);
        spawnAnimal(x);
      }
    }

    function createTree(x, baseY) {
      const trunkHeight = 4 + Math.floor(Math.random() * 2);
      for (let i = 0; i < trunkHeight; i++) {
        setBlock(x, baseY - i, 'wood');
      }
      const canopyY = baseY - trunkHeight;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          if (Math.abs(dx) + Math.abs(dy) <= 3) {
            setBlock(x + dx, canopyY + dy, 'leaves');
          }
        }
      }
      setBlock(x, canopyY - 1, 'leaves');
      setBlock(x, canopyY + 2, 'leaves');
    }

    function spawnAnimal(x) {
      const type = ['pig', 'cow', 'sheep'][Math.floor(Math.random() * 3)];
      const groundY = findGround(x);
      animals.push({
        type,
        x: x * TILE,
        y: (groundY - 1) * TILE,
        w: 24,
        h: 24,
        vx: (Math.random() > 0.5 ? 1 : -1) * 0.4,
        dir: Math.random() > 0.5 ? 1 : -1,
        alive: true,
        cooldown: 0,
      });
    }

    function findGround(x) {
      for (let y = WORLD_H - 10; y >= 0; y--) {
        if (isSolid(getBlock(x, y))) return y;
      }
      return WORLD_H - 10;
    }

    function spawnMob() {
      const side = Math.random() > 0.5 ? -1 : 1;
      const x = side === -1 ? 4 : WORLD_W - 6;
      const type = ['zombie', 'skeleton', 'spider'][Math.floor(Math.random() * 3)];
      const y = (WORLD_H - 11) * TILE;
      mobs.push({
        type,
        x: x * TILE,
        y,
        w: 22,
        h: 28,
        vx: side * 0.7,
        health: 3,
        cooldown: 0,
      });
    }

    function resetPlayer() {
      player.x = 12 * TILE;
      player.y = (WORLD_H - 12) * TILE;
      player.vx = 0;
      cameraOffset = { x: 0, y: 0 };
      player.vy = 0;
      player.health = 10;
      player.hunger = 100;
      player.meat = 0;
      hotbarItems.forEach((slot) => {
        if (slot.id === 'dirt') slot.count = 24;
        if (slot.id === 'stone') slot.count = 18;
        if (slot.id === 'wood') slot.count = 8;
        if (slot.id === 'crafting_table') slot.count = 0;
        if (slot.id === 'planks') slot.count = 0;
        if (slot.id === 'leaves') slot.count = 0;
      });
      selectedIndex = 0;
      animals.splice(0, animals.length);
      mobs.splice(0, mobs.length);
      for (let i = 0; i < 5; i++) {
        const x = 8 + Math.floor(Math.random() * 30);
        spawnAnimal(x);
      }
      renderHotbar();
    }

    function renderHotbar() {
      hotbarEl.innerHTML = '';
      hotbarItems.forEach((slot, index) => {
        const div = document.createElement('div');
        div.className = `slot ${index === selectedIndex ? 'selected' : ''}`;
        div.textContent = slot.label[0].toUpperCase();
        const count = document.createElement('span');
        count.className = 'count';
        count.textContent = slot.count;
        div.appendChild(count);
        hotbarEl.appendChild(div);
      });
    }

    function updateHud() {
      const healthPct = (player.health / 10) * 100;
      const hungerPct = player.hunger;
      healthBar.style.width = `${healthPct}%`;
      hungerBar.style.width = `${hungerPct}%`;
      const phase = (time / DAY_LENGTH) % 1;
      const isNight = phase < 0.25 || phase > 0.75;
      statusEl.textContent = isNight ? 'Nighttime • Mobs are hunting' : 'Daytime • Build and survive';
      if (player.health <= 0) {
        statusEl.textContent = 'You died. Press R or refresh to restart.';
      }
    }

    function updateCamera() {
      if (cameraKeys.left) cameraOffset.x -= 8;
      if (cameraKeys.right) cameraOffset.x += 8;
      if (cameraKeys.up) cameraOffset.y -= 8;
      if (cameraKeys.down) cameraOffset.y += 8;
      cameraOffset.x = clamp(cameraOffset.x, -240, 240);
      cameraOffset.y = clamp(cameraOffset.y, -160, 160);

      const targetX = player.x + player.w / 2 - canvas.width / 2 + cameraOffset.x;
      const targetY = player.y + player.h / 2 - canvas.height / 2 + cameraOffset.y;
      camera.x = clamp(targetX, 0, WORLD_W * TILE - canvas.width);
      camera.y = clamp(targetY, 0, WORLD_H * TILE - canvas.height);
    }

    function drawBlock(type, x, y) {
      const px = x - camera.x;
      const py = y - camera.y;
      ctx.fillStyle = '#111';
      ctx.fillRect(px, py, TILE, TILE);
      switch (type) {
        case 'grass':
          ctx.fillStyle = '#3fba4f';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#7d4a1d';
          ctx.fillRect(px, py + TILE - 6, TILE, 6);
          break;
        case 'dirt':
          ctx.fillStyle = '#8b5a2b';
          ctx.fillRect(px, py, TILE, TILE);
          break;
        case 'stone':
          ctx.fillStyle = '#8d8d8d';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#6b6b6b';
          ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
          break;
        case 'wood':
          ctx.fillStyle = '#8a5527';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#4f2f10';
          ctx.fillRect(px + 4, py + 2, TILE - 8, TILE - 4);
          break;
        case 'leaves':
          ctx.fillStyle = '#2f7a2a';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#4ba446';
          ctx.fillRect(px + 3, py + 3, TILE - 6, TILE - 6);
          break;
        case 'crafting_table':
          ctx.fillStyle = '#8a5527';
          ctx.fillRect(px, py, TILE, TILE);
          ctx.fillStyle = '#c9853d';
          ctx.fillRect(px + 3, py + 3, 6, 6);
          ctx.fillRect(px + 13, py + 3, 6, 6);
          ctx.fillRect(px + 3, py + 13, 6, 6);
          ctx.fillRect(px + 13, py + 13, 6, 6);
          break;
        default:
          break;
      }
    }

    function drawWorld() {
      const startX = Math.floor(camera.x / TILE) - 1;
      const endX = Math.ceil((camera.x + canvas.width) / TILE) + 1;
      const startY = Math.floor(camera.y / TILE) - 1;
      const endY = Math.ceil((camera.y + canvas.height) / TILE) + 1;
      for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
          const type = getBlock(x, y);
          if (type !== 'air') {
            drawBlock(type, x * TILE, y * TILE);
          }
        }
      }
    }

    function drawSky() {
      const phase = (time / DAY_LENGTH) % 1;
      const sunX = (phase * canvas.width);
      const sunY = 80 + Math.sin(phase * Math.PI * 2) * 140;
      const moonX = (phase * canvas.width + canvas.width * 0.5) % canvas.width;
      const moonY = 80 + Math.sin((phase + 0.5) * Math.PI * 2) * 140;
      const isNight = phase < 0.25 || phase > 0.75;
      ctx.fillStyle = isNight ? '#081220' : '#88d3ff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (!isNight) {
        ctx.fillStyle = '#ffd966';
        ctx.beginPath();
        ctx.arc(sunX, sunY, 34, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#f5f7ff';
        ctx.beginPath();
        ctx.arc(moonX, moonY, 28, 0, Math.PI * 2);
        ctx.fill();
        for (let i = 0; i < 18; i++) {
          const sx = (i * 44) % canvas.width;
          const sy = (i * 31) % 120;
          ctx.fillRect(sx + 6, sy + 10, 2, 2);
        }
      }
      ctx.fillStyle = isNight ? '#142234' : '#9fe597';
      ctx.fillRect(0, canvas.height - 140, canvas.width, 140);
    }

    function drawPlayer() {
      const px = player.x - camera.x;
      const py = player.y - camera.y;
      ctx.fillStyle = '#4f7dff';
      ctx.fillRect(px, py, player.w, player.h);
      ctx.fillStyle = '#2b3f80';
      ctx.fillRect(px + 4, py + 8, 10, 10);
      ctx.fillRect(px + player.w - 14, py + 8, 10, 10);
      ctx.fillStyle = '#f0d7a8';
      ctx.fillRect(px + 2, py + player.h - 8, player.w - 4, 8);
    }

    function drawAnimals() {
      for (const animal of animals) {
        const px = animal.x - camera.x;
        const py = animal.y - camera.y;
        if (px < -80 || px > canvas.width + 80) continue;
        ctx.fillStyle = animal.type === 'cow' ? '#f5f5f5' : animal.type === 'sheep' ? '#f5f5f5' : '#d7773f';
        ctx.fillRect(px, py, animal.w, animal.h);
        ctx.fillStyle = animal.type === 'pig' ? '#f2b0c8' : animal.type === 'cow' ? '#b89163' : '#e8e8e8';
        ctx.fillRect(px + 4, py + 4, animal.w - 8, 8);
        ctx.fillStyle = '#000';
        ctx.fillRect(px + 5, py + 5, 4, 4);
        ctx.fillRect(px + animal.w - 9, py + 5, 4, 4);
      }
    }

    function drawMobs() {
      for (const mob of mobs) {
        const px = mob.x - camera.x;
        const py = mob.y - camera.y;
        if (px < -80 || px > canvas.width + 80) continue;
        ctx.fillStyle = mob.type === 'skeleton' ? '#ececec' : mob.type === 'spider' ? '#242424' : '#4d7e34';
        ctx.fillRect(px, py, mob.w, mob.h);
        ctx.fillStyle = mob.type === 'skeleton' ? '#3f2f15' : '#ff5d5d';
        ctx.fillRect(px + 4, py + 4, mob.w - 8, 8);
      }
    }

    function drawCrosshair() {
      const x = canvas.width / 2;
      const y = canvas.height / 2;
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 8, y);
      ctx.lineTo(x + 8, y);
      ctx.moveTo(x, y - 8);
      ctx.lineTo(x, y + 8);
      ctx.stroke();
    }

    function mouseToWorld(mx, my) {
      return {
        x: Math.floor((mx + camera.x) / TILE),
        y: Math.floor((my + camera.y) / TILE),
      };
    }

    function breakBlockAt(x, y) {
      if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return;
      const type = getBlock(x, y);
      if (!breakableTypes.has(type)) return;
      if (type === 'leaves') {
        setBlock(x, y, 'air');
        return;
      }
      setBlock(x, y, 'air');
      const slot = hotbarItems.find((s) => s.id === type);
      if (slot) slot.count += 1;
      renderHotbar();
    }

    function placeBlockAt(x, y) {
      if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return;
      if (getBlock(x, y) !== 'air') return;
      const slot = hotbarItems[selectedIndex];
      if (!slot || slot.count <= 0) return;
      const blockType = slot.id;
      if (blockType === 'crafting_table' || blockType === 'planks' || blockType === 'leaves') {
        setBlock(x, y, blockType);
        slot.count -= 1;
        renderHotbar();
      } else {
        setBlock(x, y, blockType);
        slot.count -= 1;
        renderHotbar();
      }
    }

    function handleAction() {
      if (!gameStarted || player.health <= 0) return;
      const worldPos = mouseToWorld(canvas.width / 2, canvas.height / 2);
      const targetBlock = getBlock(worldPos.x, worldPos.y);
      const target = animals.find((animal) => {
        return Math.abs(animal.x - (worldPos.x * TILE + TILE / 2)) < TILE * 1.3 && Math.abs(animal.y - (worldPos.y * TILE + TILE / 2)) < TILE * 1.3;
      });
      if (target) {
        target.cooldown = 0;
        target.alive = false;
        player.meat += 1;
        player.hunger = Math.min(100, player.hunger + 20);
        return;
      }
      const mobTarget = mobs.find((mob) => {
        return Math.abs(mob.x - (worldPos.x * TILE + TILE / 2)) < TILE * 1.3 && Math.abs(mob.y - (worldPos.y * TILE + TILE / 2)) < TILE * 1.3;
      });
      if (mobTarget) {
        mobTarget.health -= 1;
        if (mobTarget.health <= 0) {
          mobs.splice(mobs.indexOf(mobTarget), 1);
        }
        return;
      }
      if (targetBlock !== 'air' && targetBlock !== 'void') {
        breakBlockAt(worldPos.x, worldPos.y);
      }
    }

    function handlePlacement() {
      if (!gameStarted || player.health <= 0) return;
      const worldPos = mouseToWorld(canvas.width / 2, canvas.height / 2);
      const target = getBlock(worldPos.x, worldPos.y);
      if (target === 'air') {
        placeBlockAt(worldPos.x, worldPos.y);
      }
    }

    function updatePlayer(delta) {
      const moveSpeed = 1.7;
      const onGroundBefore = player.onGround;
      player.vx = 0;
      if (keys['a']) player.vx -= moveSpeed;
      if (keys['d']) player.vx += moveSpeed;
      if (keys['w']) player.y -= moveSpeed * delta * 0.06;
      if (keys['s']) player.y += moveSpeed * delta * 0.06;
      if (keys[' '] && player.onGround) {
        player.vy = -7.4;
        player.onGround = false;
      }
      if (keys['e'] && eatCooldown <= 0 && player.meat > 0) {
        player.meat -= 1;
        player.hunger = Math.min(100, player.hunger + 30);
        eatCooldown = 420;
      }

      player.vy += 0.28 * delta * 0.06;
      player.x += player.vx * delta * 0.06;
      resolveHorizontal();
      player.y += player.vy * delta * 0.06;
      resolveVertical();
      if (player.onGround && !onGroundBefore) {
        player.vy = 0;
      }
      player.x = clamp(player.x, 0, WORLD_W * TILE - player.w);
      player.y = clamp(player.y, 0, WORLD_H * TILE - player.h);

      if (player.health > 0) {
        hungerTimer += delta;
        if (hungerTimer >= 60000) {
          player.hunger = Math.max(0, player.hunger - 1);
          hungerTimer = 0;
        }
        hungerDamageTimer += delta;
        if (player.hunger <= 20 && hungerDamageTimer >= 3000) {
          player.health -= 0.5;
          hungerDamageTimer = 0;
        }
      }
      attackCooldown = Math.max(0, attackCooldown - delta);
      eatCooldown = Math.max(0, eatCooldown - delta);
      if (player.health <= 0) {
        player.health = 0;
      }
    }

    function resolveHorizontal() {
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.w - 1) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.h - 1) / TILE);
      const checkY = [top, bottom];
      for (const y of checkY) {
        if (isSolid(getBlock(left, y))) player.x = (left + 1) * TILE;
        if (isSolid(getBlock(right, y))) player.x = right * TILE - player.w;
      }
    }

    function resolveVertical() {
      const left = Math.floor(player.x / TILE);
      const right = Math.floor((player.x + player.w - 1) / TILE);
      const top = Math.floor(player.y / TILE);
      const bottom = Math.floor((player.y + player.h - 1) / TILE);
      const checkX = [left, right];
      player.onGround = false;
      for (const x of checkX) {
        if (isSolid(getBlock(x, bottom + 1))) {
          player.y = bottom * TILE - player.h;
          player.vy = 0;
          player.onGround = true;
        }
        if (isSolid(getBlock(x, top))) {
          player.y = (top + 1) * TILE;
          player.vy = 0;
        }
      }
    }

    function updateAnimals(delta) {
      for (const animal of animals) {
        if (!animal.alive) continue;
        animal.x += animal.vx * delta * 0.06;
        const groundY = findGround(Math.floor(animal.x / TILE));
        if (animal.y < (groundY - 1) * TILE) {
          animal.y = (groundY - 1) * TILE;
        }
        if (Math.random() < 0.008) {
          animal.vx *= -1;
          animal.dir *= -1;
        }
        if (Math.abs(animal.x - player.x) < TILE * 6) {
          animal.vx = animal.dir * 0.4;
        }
      }
    }

    function updateMobs(delta) {
      const phase = (time / DAY_LENGTH) % 1;
      const isNight = phase < 0.25 || phase > 0.75;
      if (isNight && Math.random() < 0.004 && mobs.length < 8) {
        spawnMob();
      }
      for (const mob of mobs) {
        const dx = player.x + player.w / 2 - (mob.x + mob.w / 2);
        if (Math.abs(dx) > 4) {
          mob.x += Math.sign(dx) * 0.8 * delta * 0.06;
        }
        const dy = player.y + player.h / 2 - (mob.y + mob.h / 2);
        if (Math.abs(dy) > 4) {
          mob.y += Math.sign(dy) * 0.35 * delta * 0.06;
        }
        mob.cooldown = Math.max(0, mob.cooldown - delta);
        if (Math.abs(dx) < TILE * 1.2 && Math.abs(dy) < TILE * 1.3 && mob.cooldown <= 0) {
          player.health -= 1;
          mob.cooldown = 1100;
        }
      }
    }

    function update(delta) {
      if (!gameStarted || player.health <= 0) return;
      updatePlayer(delta);
      updateAnimals(delta);
      updateMobs(delta);
      updateCamera();
      updateHud();
    }

    function draw() {
      drawSky();
      drawWorld();
      drawAnimals();
      drawMobs();
      drawPlayer();
      drawCrosshair();
    }

    function loop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const delta = timestamp - lastTime;
      lastTime = timestamp;
      time += delta;
      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    function handleMouseDown(event) {
      if (!gameStarted) return;
      if (event.button === 0) {
        mouse.down = true;
        handleAction();
      }
      if (event.button === 2) {
        mouse.rightDown = true;
        handlePlacement();
      }
      event.preventDefault();
    }

    function handleMouseUp(event) {
      if (event.button === 0) mouse.down = false;
      if (event.button === 2) mouse.rightDown = false;
    }

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      if (event.code === 'Space') event.preventDefault();
      if (['arrowleft', 'arrowright', 'arrowup', 'arrowdown'].includes(key)) {
        const dir = key.replace('arrow', '');
        cameraKeys[dir] = true;
        event.preventDefault();
      } else {
        keys[key] = true;
      }
      if (key === 'f' && gameStarted && craftingNear) {
        craftOverlay.classList.add('show');
      }
      if (key === 'r' && player.health <= 0) {
        resetPlayer();
      }
      if (key >= '1' && key <= '8') {
        selectedIndex = parseInt(key, 10) - 1;
        renderHotbar();
      }
    });

    window.addEventListener('keyup', (event) => {
      const key = event.key.toLowerCase();
      if (['arrowleft', 'arrowright', 'arrowup', 'arrowdown'].includes(key)) {
        const dir = key.replace('arrow', '');
        cameraKeys[dir] = false;
      } else {
        keys[key] = false;
      }
    });

    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mouseup', handleMouseUp);
    canvas.addEventListener('contextmenu', (event) => event.preventDefault());
    canvas.addEventListener('mousemove', (event) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = event.clientX - rect.left;
      mouse.y = event.clientY - rect.top;
    });

    function checkCraftingNear() {
      const playerCenterX = player.x + player.w / 2;
      const playerCenterY = player.y + player.h / 2;
      for (let y = Math.floor(playerCenterY / TILE) - 1; y <= Math.floor(playerCenterY / TILE) + 1; y++) {
        for (let x = Math.floor(playerCenterX / TILE) - 1; x <= Math.floor(playerCenterX / TILE) + 1; x++) {
          if (getBlock(x, y) === 'crafting_table') {
            craftingNear = true;
            return;
          }
        }
      }
      craftingNear = false;
    }

    function craftPlanks() {
      const slot = hotbarItems.find((s) => s.id === 'wood');
      if (slot && slot.count >= 4) {
        slot.count -= 4;
        const planks = hotbarItems.find((s) => s.id === 'planks');
        planks.count += 4;
        renderHotbar();
      }
    }

    function craftTable() {
      const slot = hotbarItems.find((s) => s.id === 'planks');
      if (slot && slot.count >= 4) {
        slot.count -= 4;
        const table = hotbarItems.find((s) => s.id === 'crafting_table');
        table.count += 1;
        renderHotbar();
      }
    }

    startBtn.addEventListener('click', () => {
      startOverlay.classList.remove('show');
      gameStarted = true;
      resetPlayer();
      requestAnimationFrame(loop);
    });

    craftPlanksBtn.addEventListener('click', craftPlanks);
    craftTableBtn.addEventListener('click', craftTable);
    closeCraftBtn.addEventListener('click', () => craftOverlay.classList.remove('show'));

    generateWorld();
    renderHotbar();
    updateHud();
    draw();

    setInterval(() => {
      checkCraftingNear();
    }, 200);
  </script>
</body>
</html>
