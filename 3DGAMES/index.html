<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low-Poly Explorer</title>
  <style>
    html, body { margin: 0; overflow: hidden; background: #0d1723; }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); color: #fff; font-family: Arial, sans-serif;
      pointer-events: none;
    }
    #overlay .panel {
      text-align: center; background: rgba(12,20,31,0.9); padding: 20px 24px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #overlay h1 { margin: 0 0 8px; font-size: 24px; }
    #overlay p { margin: 0; opacity: 0.9; }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="panel">
      <h1>Low-Poly Explorer</h1>
      <p>W = forward • S = backward • A = left • D = right • Space = jump</p>
    </div>
  </div>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7ec8ff);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.8, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();
    const keys = {};
    const mouse = { sensitivity: 0.002, yaw: 0, pitch: 0 };

    const player = {
      position: new THREE.Vector3(0, 1.8, 0),
      velocity: new THREE.Vector3(),
      speed: 8,
      height: 1.8,
      grounded: true,
      jumpForce: 8.4,
      gravity: 24
    };

    const chunkSize = 40;
    const renderDistance = 4;
    const chunks = new Map();
    const colliders = [];

    const ambient = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1.15);
    sun.position.set(12, 22, 8);
    sun.castShadow = true;
    scene.add(sun);

    const waterCanvas = document.createElement('canvas');
    waterCanvas.width = 256;
    waterCanvas.height = 256;
    const waterCtx = waterCanvas.getContext('2d');
    const waterTexture = new THREE.CanvasTexture(waterCanvas);
    waterTexture.wrapS = THREE.RepeatWrapping;
    waterTexture.wrapT = THREE.RepeatWrapping;
    waterTexture.repeat.set(2, 2);
    const waterMaterial = new THREE.MeshStandardMaterial({
      map: waterTexture,
      color: 0x2f79d6,
      transparent: true,
      opacity: 0.9,
      roughness: 0.2,
      metalness: 0.05
    });

    function createTree(x, z) {
      const group = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.BoxGeometry(0.35, 2.2, 0.35),
        new THREE.MeshStandardMaterial({ color: 0x7a4a23 })
      );
      trunk.position.y = 1.1;
      group.add(trunk);

      const crown = new THREE.Mesh(
        new THREE.ConeGeometry(1.4, 2.2, 5),
        new THREE.MeshStandardMaterial({ color: 0x2f7c32 })
      );
      crown.position.y = 2.7;
      group.add(crown);

      group.position.set(x, 0, z);
      scene.add(group);
      colliders.push({ x, z, width: 0.7, depth: 0.7, height: 3.5, kind: 'tree' });
      return group;
    }

    function createRock(x, z) {
      const rock = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.8, 0),
        new THREE.MeshStandardMaterial({ color: 0x6f6f6f, roughness: 1 })
      );
      rock.position.set(x, 0.8, z);
      scene.add(rock);
      colliders.push({ x, z, width: 0.95, depth: 0.95, height: 1.8, kind: 'rock' });
      return rock;
    }

    function riverAt(x, z) {
      const centerX = Math.sin(z / 18) * 8 + z * 0.015;
      return Math.abs(x - centerX) < 6.5;
    }

    function createChunk(cx, cz) {
      const group = new THREE.Group();
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(chunkSize, chunkSize, 1, 1),
        new THREE.MeshStandardMaterial({ color: 0x4f9a3f, roughness: 1 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.set(cx * chunkSize, 0, cz * chunkSize);
      ground.receiveShadow = true;
      group.add(ground);

      const centerX = cx * chunkSize + chunkSize / 2;
      const centerZ = cz * chunkSize + chunkSize / 2;
      if (riverAt(centerX, centerZ)) {
        const water = new THREE.Mesh(
          new THREE.PlaneGeometry(chunkSize, chunkSize, 24, 24),
          waterMaterial
        );
        water.rotation.x = -Math.PI / 2;
        water.position.set(centerX, 0.25, centerZ);
        water.receiveShadow = true;
        group.add(water);
        group.userData.water = water;
      }

      const chunkColliders = [];
      for (let i = 0; i < 7; i++) {
        const localX = (i + 1) * (chunkSize / 8) - chunkSize / 2;
        const localZ = ((i % 3) - 1) * (chunkSize / 6) - chunkSize / 10;
        const x = centerX + localX * 0.15 + Math.sin(cx + cz + i) * 1.2;
        const z = centerZ + localZ * 0.18 + Math.cos(cx * 2 + cz + i) * 1.3;
        if (Math.abs(x) < 180 && Math.abs(z) < 180 && !riverAt(x, z)) {
          const spawnChance = ((i + 1) % 3 === 0) ? 0.7 : 0.45;
          if (Math.random() < spawnChance) {
            const useTree = ((cx + cz + i) % 3) !== 0;
            const object = useTree ? createTree(x, z) : createRock(x, z);
            object.position.y = 0;
            chunkColliders.push(object);
          }
        }
      }

      scene.add(group);
      chunks.set(`${cx},${cz}`, { group, colliders: chunkColliders });
    }

    function removeChunk(key, chunk) {
      scene.remove(chunk.group);
      for (const collider of chunk.colliders) {
        const index = colliders.indexOf(collider);
        if (index >= 0) colliders.splice(index, 1);
      }
      chunk.group.traverse((child) => {
        if (child.isMesh) {
          child.geometry.dispose();
          if (child.material) child.material.dispose();
        }
      });
    }

    function ensureChunks() {
      const playerChunkX = Math.floor(player.position.x / chunkSize);
      const playerChunkZ = Math.floor(player.position.z / chunkSize);
      for (let dx = -renderDistance; dx <= renderDistance; dx++) {
        for (let dz = -renderDistance; dz <= renderDistance; dz++) {
          const key = `${playerChunkX + dx},${playerChunkZ + dz}`;
          if (!chunks.has(key)) createChunk(playerChunkX + dx, playerChunkZ + dz);
        }
      }
      for (const [key, chunk] of chunks.entries()) {
        const [cx, cz] = key.split(',').map(Number);
        if (Math.abs(cx - playerChunkX) > renderDistance || Math.abs(cz - playerChunkZ) > renderDistance) {
          removeChunk(key, chunk);
          chunks.delete(key);
        }
      }
    }

    const skyGeometry = new THREE.SphereGeometry(180, 32, 32);
    const skyMaterial = new THREE.MeshBasicMaterial({
      color: 0x8ad8ff,
      side: THREE.BackSide
    });
    const sky = new THREE.Mesh(skyGeometry, skyMaterial);
    scene.add(sky);

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Space') e.preventDefault();
    });
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement === renderer.domElement) {
        document.getElementById('overlay').style.display = 'none';
      } else {
        document.getElementById('overlay').style.display = 'flex';
      }
    });
    renderer.domElement.addEventListener('click', () => {
      renderer.domElement.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement !== renderer.domElement) return;
      mouse.yaw -= e.movementX * mouse.sensitivity;
      mouse.pitch = THREE.MathUtils.clamp(mouse.pitch - e.movementY * mouse.sensitivity, -1.2, 1.2);
    });

    function updateWaterTexture(time) {
      waterCtx.clearRect(0, 0, waterCanvas.width, waterCanvas.height);
      const gradient = waterCtx.createLinearGradient(0, 0, 0, waterCanvas.height);
      gradient.addColorStop(0, 'rgba(84, 171, 255, 0.82)');
      gradient.addColorStop(1, 'rgba(18, 91, 185, 0.95)');
      waterCtx.fillStyle = gradient;
      waterCtx.fillRect(0, 0, waterCanvas.width, waterCanvas.height);

      waterCtx.strokeStyle = 'rgba(255,255,255,0.35)';
      waterCtx.lineWidth = 2;
      for (let i = 0; i < 10; i++) {
        const y = (i / 10) * waterCanvas.height;
        waterCtx.beginPath();
        waterCtx.moveTo(0, y);
        for (let x = 0; x <= waterCanvas.width; x += 16) {
          const wave = Math.sin(x / 40 + time * 2.4 + i * 0.7) * 5;
          waterCtx.lineTo(x, y + wave);
        }
        waterCtx.stroke();
      }
      waterTexture.needsUpdate = true;
      waterTexture.offset.x = time * 0.035;
      waterTexture.offset.y = Math.sin(time * 0.85) * 0.02;
    }

    function isBlocked(x, z) {
      for (const collider of colliders) {
        const insideX = x >= collider.x - collider.width && x <= collider.x + collider.width;
        const insideZ = z >= collider.z - collider.depth && z <= collider.z + collider.depth;
        if (insideX && insideZ) return true;
      }
      return false;
    }

    function updatePlayer(dt) {
      const forward = new THREE.Vector3(Math.sin(mouse.yaw), 0, Math.cos(mouse.yaw));
      const right = new THREE.Vector3(Math.cos(mouse.yaw), 0, -Math.sin(mouse.yaw));
      const move = new THREE.Vector3();

      if (keys['KeyW']) move.add(forward);
      if (keys['KeyS']) move.sub(forward);
      if (keys['KeyA']) move.sub(right);
      if (keys['KeyD']) move.add(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(player.speed * dt);
      }

      const nextPosition = player.position.clone();
      nextPosition.x += move.x;
      nextPosition.z += move.z;

      if (!isBlocked(nextPosition.x, nextPosition.z)) {
        player.position.x = nextPosition.x;
        player.position.z = nextPosition.z;
      }

      if (keys['Space'] && player.grounded) {
        player.velocity.y = player.jumpForce;
        player.grounded = false;
      }

      player.velocity.y -= player.gravity * dt;
      player.position.y += player.velocity.y * dt;

      if (player.position.y <= player.height) {
        player.position.y = player.height;
        player.velocity.y = 0;
        player.grounded = true;
      }

      camera.rotation.order = 'YXZ';
      camera.rotation.y = mouse.yaw;
      camera.rotation.x = mouse.pitch;
      camera.position.copy(player.position);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.032);
      const time = clock.elapsedTime;
      updateWaterTexture(time);
      updatePlayer(dt);
      ensureChunks();
      renderer.render(scene, camera);
    }
    ensureChunks();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
