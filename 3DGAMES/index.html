<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Tag 3D</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0e1722;
      color: white;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(#5fd1ff, #2b4f35 65%, #132318 100%);
      cursor: crosshair;
    }
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .info {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 13px;
      line-height: 1.45;
    }
    .gameover {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      pointer-events: auto;
    }
    .gameover.show { display: flex; }
    .panel {
      background: #1d2c2b;
      padding: 20px 24px;
      border-radius: 12px;
      border: 2px solid #b85f3f;
      text-align: center;
    }
    .crosshair {
      position: absolute;
      top: 50%; left: 50%;
      width: 16px; height: 16px;
      transform: translate(-50%, -50%);
    }
    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.95);
    }
    .crosshair::before { width: 2px; height: 16px; left: 7px; }
    .crosshair::after { width: 16px; height: 2px; top: 7px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="info">Tag Game<br>WASD to move • Cat is it • If the cat touches you, game over</div>
    <div class="crosshair"></div>
    <div class="gameover" id="gameover">
      <div class="panel">
        <h2>Game Over</h2>
        <p>The cat tagged you.</p>
        <button onclick="location.reload()">Play Again</button>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const gameoverEl = document.getElementById('gameover');

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const keys = {};
    const player = { x: 0, y: 1.2, z: 0, speed: 18, radius: 0.8 };
    const cat = { x: 8, y: 1.2, z: -6, speed: 10.5, radius: 1.0 };
    const look = { yaw: 0, pitch: 0 };
    const platform = { size: 40, height: 0.2 };
    let gameOver = false;

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function updatePlayer(dt) {
      const forward = { x: Math.sin(look.yaw), z: Math.cos(look.yaw) };
      const right = { x: Math.cos(look.yaw), z: -Math.sin(look.yaw) };
      let moveX = 0, moveZ = 0;
      if (keys['w']) { moveX += forward.x; moveZ += forward.z; }
      if (keys['s']) { moveX -= forward.x; moveZ -= forward.z; }
      if (keys['a']) { moveX -= right.x; moveZ -= right.z; }
      if (keys['d']) { moveX += right.x; moveZ += right.z; }
      const len = Math.hypot(moveX, moveZ) || 1;
      moveX /= len; moveZ /= len;
      player.x += moveX * player.speed * dt;
      player.z += moveZ * player.speed * dt;
      player.x = clamp(player.x, -platform.size + 1.5, platform.size - 1.5);
      player.z = clamp(player.z, -platform.size + 1.5, platform.size - 1.5);
    }

    function updateCat(dt) {
      const dx = player.x - cat.x;
      const dz = player.z - cat.z;
      const dist = Math.hypot(dx, dz) || 0.001;
      cat.x += (dx / dist) * cat.speed * dt;
      cat.z += (dz / dist) * cat.speed * dt;
      if (Math.hypot(player.x - cat.x, player.z - cat.z) < player.radius + cat.radius) {
        gameOver = true;
      }
    }

    function drawPlatform() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, '#70d7ff');
      sky.addColorStop(0.6, '#3f7550');
      sky.addColorStop(1, '#132c1f');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      const base = 0.2;
      ctx.fillStyle = '#4a7a3a';
      ctx.fillRect(0, h * 0.72, w, h * 0.28);

      ctx.save();
      ctx.translate(w * 0.5, h * 0.7);
      ctx.scale(1.2, 0.6);
      ctx.fillStyle = '#2c5e2d';
      ctx.beginPath();
      ctx.moveTo(-260, 0);
      ctx.lineTo(260, 0);
      ctx.lineTo(220, 80);
      ctx.lineTo(-220, 80);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawScene() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      drawPlatform();

      ctx.save();
      ctx.translate(w * 0.5, h * 0.5);
      ctx.scale(1, 1);

      const playerScreenX = 0;
      const playerScreenY = 0;
      ctx.fillStyle = '#1f5cff';
      ctx.beginPath();
      ctx.arc(playerScreenX, playerScreenY - 20, 16, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#8d4a1f';
      ctx.beginPath();
      ctx.arc(-80, -30, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#7c3d17';
      ctx.fillRect(-95, -10, 30, 28);

      ctx.restore();
    }

    function loop(now) {
      const dt = Math.min(0.03, (now - (loop.last || now)) / 1000);
      loop.last = now;
      if (!gameOver) {
        updatePlayer(dt);
        updateCat(dt);
      }
      drawScene();
      if (gameOver) gameoverEl.classList.add('show');
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') e.preventDefault();
      keys[e.key.toLowerCase()] = true;
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    window.addEventListener('mousemove', (e) => {
      const sensitivity = 0.0022;
      look.yaw -= e.movementX * sensitivity;
      look.pitch = clamp(look.pitch - e.movementY * sensitivity, -0.8, 0.8);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') look.yaw -= 0.15;
      if (e.key === 'ArrowRight') look.yaw += 0.15;
      if (e.key === 'ArrowUp') look.pitch = clamp(look.pitch - 0.1, -0.8, 0.8);
      if (e.key === 'ArrowDown') look.pitch = clamp(look.pitch + 0.1, -0.8, 0.8);
    });
  </script>
</body>
</html>
