<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low-Poly Explorer</title>
  <style>
    html, body { margin: 0; overflow: hidden; background: #0d1723; }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); color: #fff; font-family: Arial, sans-serif;
      pointer-events: none;
    }
    #overlay .panel {
      text-align: center; background: rgba(12,20,31,0.9); padding: 20px 24px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #overlay h1 { margin: 0 0 8px; font-size: 24px; }
    #overlay p { margin: 0; opacity: 0.9; }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="panel">
      <h1>Low-Poly Explorer</h1>
      <p>WASD to move • Mouse to look around</p>
    </div>
  </div>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7ec8ff);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.8, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();
    const keys = {};
    const mouse = { sensitivity: 0.002, yaw: 0, pitch: 0 };

    const player = {
      velocity: new THREE.Vector3(),
      speed: 8,
      height: 1.8,
      grounded: true
    };

    const worldRadius = 80;
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(worldRadius * 2, worldRadius * 2, 80, 80),
      new THREE.MeshStandardMaterial({ color: 0x4f9a3f, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const ambient = new THREE.AmbientLight(0xffffff, 0.65);
    scene.add(ambient);
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    function createTree(x, z) {
      const group = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.BoxGeometry(0.35, 2.2, 0.35),
        new THREE.MeshStandardMaterial({ color: 0x7a4a23 })
      );
      trunk.position.y = 1.1;
      group.add(trunk);

      const crown = new THREE.Mesh(
        new THREE.ConeGeometry(1.4, 2.2, 5),
        new THREE.MeshStandardMaterial({ color: 0x2f7c32 })
      );
      crown.position.y = 2.7;
      group.add(crown);

      group.position.set(x, 0, z);
      scene.add(group);
      return group;
    }

    function createRock(x, z) {
      const rock = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.8, 0),
        new THREE.MeshStandardMaterial({ color: 0x6f6f6f, roughness: 1 })
      );
      rock.position.set(x, 0.8, z);
      scene.add(rock);
      return rock;
    }

    for (let i = 0; i < 120; i++) {
      const x = (Math.random() - 0.5) * worldRadius * 1.8;
      const z = (Math.random() - 0.5) * worldRadius * 1.8;
      if (Math.abs(x) < 6 && Math.abs(z) < 6) continue;
      if (Math.random() < 0.6) createTree(x, z);
      else createRock(x, z);
    }

    // Simple sky dome
    const skyGeometry = new THREE.SphereGeometry(180, 32, 32);
    const skyMaterial = new THREE.MeshBasicMaterial({
      color: 0x8ad8ff,
      side: THREE.BackSide
    });
    const sky = new THREE.Mesh(skyGeometry, skyMaterial);
    scene.add(sky);

    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
    });
    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement === renderer.domElement) {
        document.getElementById('overlay').style.display = 'none';
      } else {
        document.getElementById('overlay').style.display = 'flex';
      }
    });
    renderer.domElement.addEventListener('click', () => {
      renderer.domElement.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement !== renderer.domElement) return;
      mouse.yaw -= e.movementX * mouse.sensitivity;
      mouse.pitch = THREE.MathUtils.clamp(mouse.pitch - e.movementY * mouse.sensitivity, -1.2, 1.2);
    });

    function updatePlayer(dt) {
      const forward = new THREE.Vector3(Math.sin(mouse.yaw), 0, Math.cos(mouse.yaw));
      const right = new THREE.Vector3(Math.cos(mouse.yaw), 0, -Math.sin(mouse.yaw));
      const move = new THREE.Vector3();

      if (keys['KeyW']) move.add(forward);
      if (keys['KeyS']) move.sub(forward);
      if (keys['KeyA']) move.sub(right);
      if (keys['KeyD']) move.add(right);

      if (move.lengthSq() > 0) {
        move.normalize().multiplyScalar(player.speed * dt);
      }

      player.velocity.x = move.x;
      player.velocity.z = move.z;
      camera.rotation.order = 'YXZ';
      camera.rotation.y = mouse.yaw;
      camera.rotation.x = mouse.pitch;

      camera.position.x += player.velocity.x;
      camera.position.z += player.velocity.z;
      camera.position.y = 1.8;
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.032);
      updatePlayer(dt);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
