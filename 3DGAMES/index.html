<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Tag Chase</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #101c1a;
      color: white;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(#7ad0ff, #2b4f35 65%, #14251d 100%);
    }
    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .menu {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,0.75);
      pointer-events: auto;
      z-index: 5;
    }
    .panel {
      background: #203031;
      border: 2px solid #8b5a3c;
      border-radius: 16px;
      padding: 20px 24px;
      width: min(90vw, 360px);
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.35);
    }
    button {
      margin: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #c96c3b;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    .info {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.16);
      font-size: 13px;
      line-height: 1.45;
      max-width: 320px;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      pointer-events: auto;
      z-index: 4;
    }
    .overlay.show { display: flex; }
    .msg {
      background: #233130;
      border: 2px solid #8b5a3c;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="menu" id="menu">
      <div class="panel">
        <h2>Select a Map</h2>
        <button onclick="startGame('backyard')">Backyard</button>
        <button onclick="startGame('park')">Park</button>
      </div>
    </div>
    <div class="info" id="info">Choose a map to start the chase.</div>
    <div class="overlay" id="winOverlay">
      <div class="msg">
        <h2>You caught the cat!</h2>
        <p>The cat is no longer running.</p>
        <button onclick="location.reload()">Play Again</button>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('menu');
    const info = document.getElementById('info');
    const winOverlay = document.getElementById('winOverlay');

    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const keys = {};
    const cam = { yaw: 0, pitch: -0.15 };
    const player = { x: 0, y: 1.3, z: 0, speed: 50, radius: 0.9, vy: 0, onGround: true };
    const cat = { x: 8, y: 1.2, z: 7, speed: 48, radius: 0.8, vx: 0, vz: 0 };
    const mapState = { current: null, objects: [] };
    let gameStarted = false;
    let won = false;

    function startGame(map) {
      mapState.current = map;
      gameStarted = true;
      menu.style.display = 'none';
      info.textContent = map === 'backyard' ? 'Backyard map: trampolines and baseball gear.' : 'Park map: benches and trees.';
      buildMap(map);
    }

    function buildMap(map) {
      mapState.objects = [];
      if (map === 'backyard') {
        for (let i = 0; i < 10; i++) {
          mapState.objects.push({ type: 'trampoline', x: (Math.random() - 0.5) * 18, z: (Math.random() - 0.5) * 18 });
          mapState.objects.push({ type: 'bat', x: (Math.random() - 0.5) * 16, z: (Math.random() - 0.5) * 16 });
        }
      } else {
        for (let i = 0; i < 12; i++) {
          mapState.objects.push({ type: 'bench', x: (Math.random() - 0.5) * 20, z: (Math.random() - 0.5) * 20 });
          mapState.objects.push({ type: 'tree', x: (Math.random() - 0.5) * 22, z: (Math.random() - 0.5) * 22 });
        }
      }
      player.x = 0; player.z = 0; cat.x = map === 'backyard' ? 6 : 8; cat.z = map === 'backyard' ? 6 : -8;
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function updatePlayer(dt) {
      if (!gameStarted || won) return;
      const forward = { x: Math.sin(cam.yaw), z: Math.cos(cam.yaw) };
      const right = { x: Math.cos(cam.yaw), z: -Math.sin(cam.yaw) };
      let moveX = 0, moveZ = 0;
      if (keys['w']) { moveX += forward.x; moveZ += forward.z; }
      if (keys['s']) { moveX -= forward.x; moveZ -= forward.z; }
      if (keys['a']) { moveX -= right.x; moveZ -= right.z; }
      if (keys['d']) { moveX += right.x; moveZ += right.z; }
      const len = Math.hypot(moveX, moveZ) || 1;
      moveX /= len; moveZ /= len;
      player.x += moveX * player.speed * dt;
      player.z += moveZ * player.speed * dt;
      player.x = clamp(player.x, -17, 17);
      player.z = clamp(player.z, -17, 17);
      if (keys[' '] && player.onGround) {
        player.vy = 8.5; player.onGround = false;
      }
      player.vy -= 12 * dt;
      player.y += player.vy * dt;
      if (player.y <= 1.3) { player.y = 1.3; player.vy = 0; player.onGround = true; }
    }

    function updateCat(dt) {
      if (!gameStarted || won) return;
      const dx = player.x - cat.x;
      const dz = player.z - cat.z;
      const dist = Math.hypot(dx, dz) || 0.001;
      const fleeX = -dx / dist;
      const fleeZ = -dz / dist;
      cat.x += fleeX * cat.speed * dt;
      cat.z += fleeZ * cat.speed * dt;
      cat.x = clamp(cat.x, -17, 17);
      cat.z = clamp(cat.z, -17, 17);
      if (Math.hypot(player.x - cat.x, player.z - cat.z) < 1.6) {
        won = true;
        winOverlay.classList.add('show');
      }
    }

    function drawScene() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, '#7fd3ff');
      sky.addColorStop(0.6, '#4f7d4b');
      sky.addColorStop(1, '#172b1f');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = '#5d8743';
      ctx.fillRect(0, h * 0.66, w, h * 0.34);

      for (const obj of mapState.objects) {
        const sx = (obj.x - player.x) * 8 + w * 0.5;
        const sy = (obj.z - player.z) * 8 + h * 0.5;
        if (obj.type === 'trampoline') {
          ctx.fillStyle = '#6e4cff';
          ctx.fillRect(sx - 18, sy - 6, 36, 12);
        } else if (obj.type === 'bat') {
          ctx.fillStyle = '#d8c08c';
          ctx.fillRect(sx - 10, sy - 4, 20, 8);
        } else if (obj.type === 'bench') {
          ctx.fillStyle = '#8b5a3c';
          ctx.fillRect(sx - 20, sy - 8, 40, 16);
        } else if (obj.type === 'tree') {
          ctx.fillStyle = '#6a3d16';
          ctx.fillRect(sx - 5, sy - 22, 10, 24);
          ctx.fillStyle = '#2e7d32';
          ctx.beginPath(); ctx.arc(sx, sy - 24, 16, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Draw player character (third person)
      ctx.save();
      ctx.translate(w * 0.5, h * 0.55);
      ctx.fillStyle = '#1f5cff';
      ctx.fillRect(-14, -46, 28, 24);
      ctx.fillStyle = '#f3d8c1';
      ctx.fillRect(-10, -22, 20, 24);
      ctx.fillStyle = '#1f5cff';
      ctx.fillRect(-16, -2, 12, 30);
      ctx.fillRect(4, -2, 12, 30);
      ctx.fillStyle = '#0f2238';
      ctx.fillRect(-8, -36, 6, 8);
      ctx.fillRect(2, -36, 6, 8);
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(-14, 28, 10, 8);
      ctx.fillRect(4, 28, 10, 8);
      ctx.restore();

      // Draw ball
      ctx.save();
      ctx.translate(w * 0.5 + 70, h * 0.55 + 10);
      ctx.fillStyle = '#ff4d4d';
      ctx.beginPath(); ctx.arc(0, -18, 28, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(-8, -24, 6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function loop(now) {
      const dt = Math.min(0.03, (now - (loop.last || now)) / 1000);
      loop.last = now;
      if (gameStarted && !won) {
        updatePlayer(dt);
        updateCat(dt);
      }
      drawScene();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') e.preventDefault();
      keys[e.key.toLowerCase()] = true;
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    window.addEventListener('mousemove', (e) => {
      const sens = 0.0025;
      cam.yaw -= e.movementX * sens;
      cam.pitch = clamp(cam.pitch - e.movementY * sens, -0.8, 0.8);
    });
  </script>
</body>
</html>
