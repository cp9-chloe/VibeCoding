<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Custom Countdown</h1>
      <p>Enter your desired hours, minutes, and seconds below.</p>
    </header>

    <section class="countdown-card">
      <form id="timer-form">
        <div class="timer-grid" aria-live="polite">
          <div class="timer-column">
            <input type="number" id="hours-input" min="0" value="0" />
            <small>Hours</small>
          </div>
          <div class="timer-column">
            <input type="number" id="minutes-input" min="0" max="59" value="0" />
            <small>Minutes</small>
          </div>
          <div class="timer-column">
            <input type="number" id="seconds-input" min="0" max="59" value="0" />
            <small>Seconds</small>
          </div>
        </div>

        <div class="settings-panel">
          <div class="field-group">
            <label for="bg-color">Background Color</label>
            <input type="color" id="bg-color" value="#102a43" />
          </div>

          <div class="field-group">
            <label for="bg-image">Background Image URL</label>
            <input type="url" id="bg-image" placeholder="https://example.com/image.jpg" />
          </div>

          <div class="field-group">
            <label for="overlay-color">Overlay Color</label>
            <input type="color" id="overlay-color" value="#000000" />
          </div>

          <div class="field-group actions">
            <button type="submit">Start Countdown</button>
          </div>
        </div>
      </form>

      <div class="message" id="message">Customize the background and set your timer values.</div>
    </section>
  </div>

  <audio id="completion-sound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/alarms/phone_ring.ogg" type="audio/ogg" />
    <source src="https://actions.google.com/sounds/v1/alarms/phone_ring.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
</html>
