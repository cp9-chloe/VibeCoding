<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeCoding Projects</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #fdf7ff;
        background: linear-gradient(135deg, #0f172a, #3b82f6, #a78bfa);
        overflow: hidden;
        position: relative;
      }

      .bubble-field {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .bubble {
        position: absolute;
        bottom: -80px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255,255,255,0.35);
        box-shadow: inset 0 0 10px rgba(255,255,255,0.35);
        animation: driftUp linear infinite;
      }

      .bubble:nth-child(odd) {
        width: 24px;
        height: 24px;
      }

      .bubble:nth-child(3n) {
        width: 30px;
        height: 30px;
      }

      .container {
        position: relative;
        z-index: 2;
        max-width: 620px;
        margin: 90px auto;
        padding: 36px 32px;
        background: rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.2);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 3.4rem;
        letter-spacing: 0.04em;
        animation: dreamyRise 4s ease-in-out infinite;
        text-shadow: 0 0 18px rgba(255, 255, 255, 0.25);
      }

      .subtitle {
        margin: 0 0 24px;
        font-size: 1.05rem;
        color: rgba(255,255,255,0.9);
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      li {
        margin: 0;
      }

      a {
        display: inline-block;
        padding: 12px 18px;
        border-radius: 999px;
        background: rgba(255,255,255,0.2);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.25s ease, background 0.25s ease;
      }

      a:hover {
        transform: translateY(-2px) scale(1.03);
        background: rgba(255,255,255,0.32);
      }

      @keyframes dreamyRise {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.95;
        }
        50% {
          transform: translateY(-8px) scale(1.03);
          opacity: 1;
        }
      }

      @keyframes driftUp {
        0% {
          transform: translate3d(0, 0, 0) scale(0.9);
          opacity: 0.15;
        }
        10% {
          opacity: 0.4;
        }
        100% {
          transform: translate3d(0, -110vh, 0) scale(1.2);
          opacity: 0;
        }
      }

      .bubble:nth-child(1) { left: 8%; animation-duration: 10s; animation-delay: 0s; }
      .bubble:nth-child(2) { left: 18%; animation-duration: 12s; animation-delay: 1.2s; }
      .bubble:nth-child(3) { left: 28%; animation-duration: 9s; animation-delay: 0.8s; }
      .bubble:nth-child(4) { left: 38%; animation-duration: 11s; animation-delay: 2s; }
      .bubble:nth-child(5) { left: 48%; animation-duration: 13s; animation-delay: 1.4s; }
      .bubble:nth-child(6) { left: 58%; animation-duration: 10s; animation-delay: 0.4s; }
      .bubble:nth-child(7) { left: 68%; animation-duration: 14s; animation-delay: 2.4s; }
      .bubble:nth-child(8) { left: 78%; animation-duration: 9.5s; animation-delay: 1.8s; }
      .bubble:nth-child(9) { left: 88%; animation-duration: 12.5s; animation-delay: 0.2s; }
    </style>
  </head>
  <body>
    <div class="bubble-field" aria-hidden="true">
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
    </div>

    <div class="container">
      <h1>My Projects</h1>
      <p class="subtitle">A dreamy little gateway to your folders.</p>
      <ul>
        <li><a href="web/">web</a></li>
        <li><a href="web2/">web2</a></li>
      </ul>
    </div>
  </body>
</html>
