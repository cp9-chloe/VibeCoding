<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;color:#e0e0e0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#533483);background-size:400% 400%;animation:gradShift 12s ease infinite}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;bottom:-40px;border-radius:50%;background:rgba(255,255,255,0.05);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0.5}50%{opacity:0.3}100%{transform:translateY(-110vh) scale(0.4);opacity:0}}
nav{position:relative;z-index:1;background:rgba(22,33,62,0.85);backdrop-filter:blur(8px);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#e0e0e0;text-decoration:none;margin-left:16px}
nav a:hover{color:#b388ff}
nav .brand{font-size:20px;font-weight:bold;color:#b388ff}
.container{position:relative;z-index:1;max-width:700px;margin:40px auto;padding:0 20px}
input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #333;border-radius:4px;background:rgba(26,26,46,0.8);color:#e0e0e0;font-size:14px}
button{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;background:#533483;color:#fff}
button:hover{background:#6a42a0}
.error{color:#f44336;margin-bottom:12px}
</style>
</head>
<body>
<div id="bubbles"></div>
<nav>
  <a href="index.html" class="brand">Blog</a>
  <div><a href="login.html">Login</a><a href="register.html">Register</a></div>
</nav>
<div class="container">
  <h1 style="margin-bottom:20px">Login</h1>
  <div id="error" class="error"></div>
  <form onsubmit="return doLogin()">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <p style="margin-top:12px"><a href="register.html" style="color:#b388ff">Don't have an account? Register</a></p>
</div>
<script>
for(let i=0;i<20;i++){let b=document.createElement("div");b.className="bubble";b.style.left=Math.random()*100+"%";b.style.width=b.style.height=(10+Math.random()*40)+"px";b.style.animationDuration=(8+Math.random()*12)+"s";b.style.animationDelay=(Math.random()*10)+"s";document.getElementById("bubbles").appendChild(b);}
</script>
<script src="app.js"></script>
<script>
function doLogin(){let r=login(document.getElementById("username").value,document.getElementById("password").value);if(r.ok)location.href="index.html";else document.getElementById("error").textContent=r.msg;return false;}
</script>
</body>
</html>
