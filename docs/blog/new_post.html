<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Post</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;color:#111;font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#ffecd2,#fcb69f,#a1c4fd,#c2e9fb);background-size:400% 400%;animation:gradShift 12s ease infinite}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;bottom:-40px;border-radius:50%;background:rgba(255,255,255,0.35);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0.5}50%{opacity:0.3}100%{transform:translateY(-110vh) scale(0.4);opacity:0}}
nav{position:relative;z-index:1;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#111;text-decoration:none;margin-left:16px}
nav a:hover{color:#e91e63}
nav .brand{font-size:20px;font-weight:700;color:#e91e63}
.container{position:relative;z-index:1;max-width:700px;margin:40px auto;padding:0 20px}
input,textarea{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ccc;border-radius:4px;background:rgba(255,255,255,0.6);color:#111;font-size:14px;font-family:'Montserrat',sans-serif}
textarea{min-height:200px;resize:vertical}
button{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;background:#e91e63;color:#fff;font-family:'Montserrat',sans-serif}
button:hover{background:#c2185b}
.btn-back{background:rgba(255,255,255,0.6);color:#111;border:1px solid #ccc;margin-bottom:20px;display:inline-block}
.btn-back:hover{background:rgba(255,255,255,0.9)}
.error{color:#f44336;margin-bottom:12px}
.preview{max-width:100%;max-height:200px;border-radius:8px;margin-bottom:12px;display:none}
label{display:block;margin-bottom:8px;font-weight:600}
</style>
</head>
<body>
<div id="bubbles"></div>
<nav>
  <a href="index.html" class="brand">Blog</a>
  <div>
    <a href="index.html">All Posts</a>
    <a href="new_post.html">New Post</a>
    <a href="#" onclick="logout();location.href='index.html'">Logout</a>
  </div>
</nav>
<div class="container">
  <a href="index.html" class="btn btn-back">&larr; Back</a>
  <h1 style="margin-bottom:20px">New Post</h1>
  <div id="error" class="error"></div>
  <form onsubmit="return doCreate()">
    <input type="text" id="title" placeholder="Title" required>
    <textarea id="body" placeholder="Write your post..." required></textarea>
    <label>Add a photo (optional)</label>
    <input type="file" id="photo" accept="image/*" onchange="previewImage()">
    <img id="preview" class="preview">
    <button type="submit">Publish</button>
  </form>
</div>
<script>
for(let i=0;i<25;i++){let b=document.createElement("div");b.className="bubble";b.style.left=Math.random()*100+"%";b.style.width=b.style.height=(10+Math.random()*50)+"px";b.style.animationDuration=(8+Math.random()*14)+"s";b.style.animationDelay=(Math.random()*10)+"s";document.getElementById("bubbles").appendChild(b);}
</script>
<script src="firebase-config.js"></script>
<script type="module">
import { isLoggedIn, createPost, logout } from "./app.js";
if (!isLoggedIn()) location.href = "login.html";
window.logout = logout;
window.previewImage = function() {
  const f = document.getElementById("photo").files[0];
  if (f) {
    const r = new FileReader();
    r.onload = function(e) {
      const img = document.getElementById("preview");
      img.src = e.target.result;
      img.style.display = "block";
    };
    r.readAsDataURL(f);
  }
};
window.doCreate = async function() {
  const title = document.getElementById("title").value;
  const body = document.getElementById("body").value;
  const img = document.getElementById("preview").src || "";
  if (!title || !body) { document.getElementById("error").textContent = "Title and body required."; return false; }
  const r = await createPost(title, body, img);
  if (r.ok) location.href = "index.html";
  else document.getElementById("error").textContent = r.msg;
  return false;
};
</script>
</body>
</html>
