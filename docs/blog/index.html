<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;color:#111;font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#ffecd2,#fcb69f,#a1c4fd,#c2e9fb);background-size:400% 400%;animation:gradShift 12s ease infinite}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;bottom:-40px;border-radius:50%;background:rgba(255,255,255,0.35);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0.5}50%{opacity:0.3}100%{transform:translateY(-110vh) scale(0.4);opacity:0}}
nav{position:relative;z-index:1;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#111;text-decoration:none;margin-left:16px}
nav a:hover{color:#e91e63}
nav .brand{font-size:20px;font-weight:700;color:#e91e63}
.container{position:relative;z-index:1;max-width:700px;margin:40px auto;padding:0 20px}
.card{background:rgba(255,255,255,0.7);backdrop-filter:blur(6px);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid rgba(0,0,0,0.05)}
.card h2{margin-bottom:8px;font-family:'Montserrat',sans-serif}
.card .meta{color:#555;font-size:13px;margin-bottom:12px;font-family:'Montserrat',sans-serif}
.card .body{line-height:1.6;font-family:'Courier New',monospace}
.card img{max-width:100%;border-radius:8px;margin-top:12px}
.btn{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;text-decoration:none;display:inline-block;font-family:'Montserrat',sans-serif}
.btn-primary{background:#e91e63;color:#fff}
.btn-primary:hover{background:#c2185b}
.btn-back{background:rgba(255,255,255,0.6);color:#111;border:1px solid #ccc;margin-bottom:20px;display:inline-block}
.btn-back:hover{background:rgba(255,255,255,0.9)}
.icon-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;margin-right:6px}
.edit-btn{background:#2196f3;color:#fff}
.edit-btn:hover{background:#1976d2}
.del-btn{background:#f44336;color:#fff}
.del-btn:hover{background:#d32f2f}
.like-btn,.dislike-btn,.comment-btn{background:none;border:1px solid #ccc;border-radius:4px;padding:5px 10px;cursor:pointer;margin-right:8px;font-family:'Montserrat',sans-serif;font-size:13px}
.like-btn:hover{border-color:#4caf50;color:#4caf50}
.dislike-btn:hover{border-color:#f44336;color:#f44336}
.comments{margin-top:12px;padding-top:12px;border-top:1px solid #ddd}
.comment{margin-bottom:8px;font-size:13px}
.comment .cmeta{color:#777;font-size:11px}
.comment-input{display:flex;gap:8px;margin-top:8px}
.comment-input input{flex:1;padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-family:'Montserrat',sans-serif}
.comment-input button{padding:6px 12px}
.actions{margin-top:12px;display:flex;align-items:center}
</style>
</head>
<body>
<div id="bubbles"></div>
<nav>
  <a href="/" class="brand">Blog</a>
  <div id="nav-links"></div>
</nav>
<div class="container">
  <h1 style="margin-bottom:20px">All Posts</h1>
  <div id="posts"></div>
</div>
<script>
for(let i=0;i<25;i++){let b=document.createElement("div");b.className="bubble";b.style.left=Math.random()*100+"%";b.style.width=b.style.height=(10+Math.random()*50)+"px";b.style.animationDuration=(8+Math.random()*14)+"s";b.style.animationDelay=(Math.random()*10)+"s";document.getElementById("bubbles").appendChild(b);}
</script>
<script src="app.js"></script>
<script>
let navLinks=document.getElementById("nav-links");
if(isLoggedIn()){navLinks.innerHTML='<a href="index.html">All Posts</a><a href="new_post.html">New Post</a><a href="#" onclick="logout();location.reload()">Logout</a>';}
else{navLinks.innerHTML='<a href="login.html">Login</a><a href="register.html">Register</a>';}
let postsDiv=document.getElementById("posts");
if(posts.length===0){postsDiv.innerHTML='<p style="color:#777">No posts yet.</p>';}
else{posts.forEach((p,i)=>{
  let imgHtml=p.image?'<img src="'+p.image+'">':"";
  let likes=p.likes.length,dislikes=p.dislikes.length;
  let likeClass=currentUser&&p.likes.includes(currentUser.id)?'style="color:#4caf50;border-color:#4caf50"':"";
  let dislikeClass=currentUser&&p.dislikes.includes(currentUser.id)?'style="color:#f44336;border-color:#f44336"':"";
  let ownerBtns=currentUser&&currentUser.id===p.userId?'<span style="margin-left:auto"><button class="icon-btn edit-btn" onclick="location.href=\'edit_post.html?id='+p.id+'\'">✏</button><button class="icon-btn del-btn" onclick="doDelete('+p.id+')">🗑</button></span>':"";
  let commentsHtml='';
  if(p.comments&&p.comments.length>0){commentsHtml='<div class="comments">'+p.comments.map(c=>'<div class="comment"><strong>'+c.username+'</strong> <span class="cmeta">'+c.created+'</span><br>'+c.text+'</div>').join('')+'</div>';}
  let commentForm=currentUser?'<div class="comment-input"><input id="ci'+p.id+'" placeholder="Add a comment..."><button class="btn btn-primary" onclick="submitComment('+p.id+')">Post</button></div>':"";
  postsDiv.innerHTML+='<div class="card"><h2>'+p.title+'</h2><div class="meta">by '+p.username+' &middot; '+p.created+'</div><div class="body">'+p.body+'</div>'+imgHtml+'<div class="actions"><button class="like-btn" '+likeClass+' onclick="doLike('+p.id+')">👍 '+likes+'</button><button class="dislike-btn" '+dislikeClass+' onclick="doDislike('+p.id+')">👎 '+dislikes+'</button>'+ownerBtns+'</div>'+commentsHtml+commentForm+'</div>';
});}
function doLike(id){if(!isLoggedIn()){location.href="login.html";return;}toggleLike(id);location.reload();}
function doDislike(id){if(!isLoggedIn()){location.href="login.html";return;}toggleDislike(id);location.reload();}
function doDelete(id){if(confirm("Delete this post?")){deletePost(id);location.reload();}}
function submitComment(id){let inp=document.getElementById("ci"+id);if(inp.value.trim()){addComment(id,inp.value);location.reload();}}
</script>
</body>
</html>
