<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;color:#e0e0e0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#533483);background-size:400% 400%;animation:gradShift 12s ease infinite}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;bottom:-40px;border-radius:50%;background:rgba(255,255,255,0.05);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0.5}50%{opacity:0.3}100%{transform:translateY(-110vh) scale(0.4);opacity:0}}
nav{position:relative;z-index:1;background:rgba(22,33,62,0.85);backdrop-filter:blur(8px);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#e0e0e0;text-decoration:none;margin-left:16px}
nav a:hover{color:#b388ff}
nav .brand{font-size:20px;font-weight:bold;color:#b388ff}
.container{position:relative;z-index:1;max-width:700px;margin:40px auto;padding:0 20px}
.card{background:rgba(22,33,62,0.8);backdrop-filter:blur(6px);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.05)}
.card h2{margin-bottom:8px}
.card .meta{color:#aaa;font-size:13px;margin-bottom:12px}
.card .body{line-height:1.6}
.btn{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;text-decoration:none;display:inline-block}
.btn-primary{background:#533483;color:#fff}
.btn-primary:hover{background:#6a42a0}
</style>
</head>
<body>
<div id="bubbles"></div>
<nav>
  <a href="/" class="brand">Blog</a>
  <div id="nav-links"></div>
</nav>
<div class="container">
  <h1 style="margin-bottom:20px">All Posts</h1>
  <div id="posts"></div>
</div>
<script>
for(let i=0;i<20;i++){let b=document.createElement("div");b.className="bubble";b.style.left=Math.random()*100+"%";b.style.width=b.style.height=(10+Math.random()*40)+"px";b.style.animationDuration=(8+Math.random()*12)+"s";b.style.animationDelay=(Math.random()*10)+"s";document.getElementById("bubbles").appendChild(b);}
</script>
<script src="app.js"></script>
<script>
let navLinks=document.getElementById("nav-links");
if(isLoggedIn()){navLinks.innerHTML='<a href="new_post.html">New Post</a><a href="#" onclick="logout();location.reload()">Logout</a>';}
else{navLinks.innerHTML='<a href="login.html">Login</a><a href="register.html">Register</a>';}
let postsDiv=document.getElementById("posts");
if(posts.length===0){postsDiv.innerHTML='<p style="color:#aaa">No posts yet.</p>';}
else{posts.forEach(p=>{postsDiv.innerHTML+='<div class="card"><h2>'+p.title+'</h2><div class="meta">by '+p.username+' &middot; '+p.created+'</div><div class="body">'+p.body+'</div></div>';});}
</script>
</body>
</html>
