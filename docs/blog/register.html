<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:Arial,sans-serif}
nav{background:#16213e;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#e0e0e0;text-decoration:none;margin-left:16px}
nav .brand{font-size:20px;font-weight:bold;color:#533483}
.container{max-width:700px;margin:40px auto;padding:0 20px}
input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #333;border-radius:4px;background:#1a1a2e;color:#e0e0e0;font-size:14px}
button{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;background:#533483;color:#fff}
button:hover{background:#6a42a0}
.error{color:#f44336;margin-bottom:12px}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="brand">Blog</a>
  <div><a href="login.html">Login</a><a href="register.html">Register</a></div>
</nav>
<div class="container">
  <h1 style="margin-bottom:20px">Register</h1>
  <div id="error" class="error"></div>
  <form onsubmit="return doRegister()">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirm" placeholder="Confirm password" required>
    <button type="submit">Register</button>
  </form>
  <p style="margin-top:12px"><a href="login.html" style="color:#533483">Already have an account? Login</a></p>
</div>
<script src="app.js"></script>
<script>
function doRegister(){
  let pw=document.getElementById("password").value;
  let cp=document.getElementById("confirm").value;
  if(pw!==cp){document.getElementById("error").textContent="Passwords do not match.";return false;}
  let r=register(document.getElementById("username").value,pw);
  if(r.ok)location.href="login.html";
  else document.getElementById("error").textContent=r.msg;
  return false;
}
</script>
</body>
</html>
