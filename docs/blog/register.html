<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;color:#111;font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#ffecd2,#fcb69f,#a1c4fd,#c2e9fb);background-size:400% 400%;animation:gradShift 12s ease infinite}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
#bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;bottom:-40px;border-radius:50%;background:rgba(255,255,255,0.35);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0.5}50%{opacity:0.3}100%{transform:translateY(-110vh) scale(0.4);opacity:0}}
nav{position:relative;z-index:1;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#111;text-decoration:none;margin-left:16px}
nav a:hover{color:#e91e63}
nav .brand{font-size:20px;font-weight:700;color:#e91e63}
.container{position:relative;z-index:1;max-width:700px;margin:40px auto;padding:0 20px}
input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ccc;border-radius:4px;background:rgba(255,255,255,0.6);color:#111;font-size:14px;font-family:'Montserrat',sans-serif}
button{padding:10px 20px;border:none;border-radius:4px;cursor:pointer;font-size:14px;background:#e91e63;color:#fff;font-family:'Montserrat',sans-serif}
button:hover{background:#c2185b}
.btn-back{background:rgba(255,255,255,0.6);color:#111;border:1px solid #ccc;margin-bottom:20px;display:inline-block}
.btn-back:hover{background:rgba(255,255,255,0.9)}
.error{color:#f44336;margin-bottom:12px;font-family:'Montserrat',sans-serif;font-weight:700}
</style>
</head>
<body>
<div id="bubbles"></div>
<nav>
  <a href="index.html" class="brand">Blog</a>
  <div>
    <a href="index.html">All Posts</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
  </div>
</nav>
<div class="container">
  <a href="index.html" class="btn btn-back">&larr; Back</a>
  <h1 style="margin-bottom:20px">Register</h1>
  <div id="error" class="error"></div>
  <form onsubmit="return doRegister()">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <input type="password" id="confirm" placeholder="Confirm password" required>
    <button type="submit">Register</button>
  </form>
  <p style="margin-top:12px"><a href="login.html" style="color:#e91e63">Already have an account? Login</a></p>
</div>
<script>
for(let i=0;i<25;i++){let b=document.createElement("div");b.className="bubble";b.style.left=Math.random()*100+"%";b.style.width=b.style.height=(10+Math.random()*50)+"px";b.style.animationDuration=(8+Math.random()*14)+"s";b.style.animationDelay=(Math.random()*10)+"s";document.getElementById("bubbles").appendChild(b);}
</script>
<script src="app.js"></script>
<script>
function doRegister(){let pw=document.getElementById("password").value;let cp=document.getElementById("confirm").value;if(pw!==cp){document.getElementById("error").textContent="Passwords do not match.";return false;}let r=register(document.getElementById("username").value,pw);if(r.ok)location.href="login.html";else{let e=document.getElementById("error");e.textContent=r.msg;e.style.color="#f44336";e.style.fontFamily="'Montserrat',sans-serif";e.style.fontWeight="700";}return false;}
</script>
</body>
</html>
