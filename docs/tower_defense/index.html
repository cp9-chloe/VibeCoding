<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Defense</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e28; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 1280, H = 720;
canvas.width = W; canvas.height = H;

const COLS = 20, ROWS = 11, TILE = 64;
const UI_H = 100;

const TOWERS = {
  arrow:  { cost: 25,  dmg: 10, range: 3,   rate: 0.5,  color: '#32c832', name: 'Arrow' },
  ice:    { cost: 35,  dmg: 5,  range: 3,   rate: 0.15, color: '#32c8c8', name: 'Ice', slow: 0.5 },
  cannon: { cost: 50,  dmg: 30, range: 2.5, rate: 1.5,  color: '#dc8c32', name: 'Cannon', splash: 1.0 },
  sniper: { cost: 60,  dmg: 50, range: 5,   rate: 1.0,  color: '#a03cc8', name: 'Sniper' },
  tesla:  { cost: 75,  dmg: 8,  range: 3.5, rate: 0.05, color: '#3264dc', name: 'Laser', laser: true },
  flame:  { cost: 45,  dmg: 15, range: 1.5, rate: 0.1,  color: '#ff4400', name: 'Flame', splash: 0.8 },
  poison: { cost: 40,  dmg: 3,  range: 3,   rate: 0.8,  color: '#88cc00', name: 'Poison', dot: 5 },
  rapid:  { cost: 55,  dmg: 6,  range: 2.5, rate: 0.08, color: '#ffcc00', name: 'Rapid' }
};

const ENEMIES = {
  basic:  { hp: 50,  reward: 5,  color: '#dc3232', size: 0.3 },
  fast:   { hp: 30,  reward: 7,  color: '#c8c832', size: 0.25 },
  tank:   { hp: 150, reward: 15, color: '#3c3c3c', size: 0.4, armor: 3 },
  flying: { hp: 40,  reward: 10, color: '#ffffff', size: 0.3, flying: true },
  healer: { hp: 60,  reward: 12, color: '#32c832', size: 0.3, healRate: 3 },
  boss:   { hp: 500, reward: 50, color: '#ff00ff', size: 0.45, armor: 5 }
};

function generateWave(waveNum) {
  const n = waveNum + 1;
  const types = Object.keys(ENEMIES);
  const available = types.filter(t => {
    if (t === 'boss') return n >= 5;
    if (t === 'flying') return n >= 3;
    if (t === 'healer') return n >= 4;
    return true;
  });
  const groups = [];
  const count = Math.floor(5 + n * 2.5);
  const batchSize = Math.min(available.length, 1 + Math.floor(n / 3));
  for (let i = 0; i < batchSize; i++) {
    const type = available[(n + i) % available.length];
    const perType = Math.max(2, Math.floor(count / batchSize));
    groups.push({ type, count: perType, interval: Math.max(0.15, 1.0 - n * 0.04) });
  }
  if (n % 5 === 0) groups.push({ type: 'boss', count: Math.floor(n / 5), interval: 2.0 });
  return groups;
}

const PATH_TILES = [
  [0,5],[1,5],[2,5],[3,5],[4,5],[5,5],[6,5],
  [6,4],[6,3],[6,2],
  [7,2],[8,2],[9,2],[10,2],
  [10,3],[10,4],[10,5],[10,6],[10,7],[10,8],
  [11,8],[12,8],[13,8],
  [13,7],[13,6],[13,5],[13,4],
  [14,4],[15,4],[16,4],[17,4],[18,4],[19,4]
];

let grid, path, state, gold, lives, selectedType;
let towers, enemies, projectiles, particles, lasers;
let waveIndex, waveActive, spawnQueue, spawnTimer, waveDelay, pendingWave, waveSent;

function resetGrid() {
  grid = Array.from({length:ROWS}, () => Array(COLS).fill(0));
  PATH_TILES.forEach(([x,y]) => grid[y][x] = 1);
  grid[5][0] = 2;
  grid[4][19] = 3;
}

function resetAll() {
  resetGrid();
  path = PATH_TILES.map(([x,y]) => ({x:x+0.5, y:y+0.5}));
  gold = 150; lives = 20;
  selectedType = null;
  towers = []; enemies = []; projectiles = []; particles = []; lasers = [];
  waveIndex = 0; waveActive = false; spawnQueue = []; spawnTimer = 0; waveDelay = 0;
  pendingWave = false; waveSent = false;
}

function initGame() {
  resetGrid();
  path = PATH_TILES.map(([x,y]) => ({x:x+0.5, y:y+0.5}));
  state = 'menu';
  gold = 150; lives = 20;
  selectedType = null;
  towers = []; enemies = []; projectiles = []; particles = []; lasers = [];
  waveIndex = 0; waveActive = false; spawnQueue = []; spawnTimer = 0; waveDelay = 0;
  pendingWave = false; waveSent = false;
}
initGame();

function canPlace(tx, ty) { return tx>=0 && tx<COLS && ty>=0 && ty<ROWS && grid[ty][tx]===0; }
function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }

function addParticles(x,y,color,count) {
  for (let i=0;i<count;i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*4;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.3+Math.random()*0.5, maxLife:0.8, color, size:2+Math.random()*3});
  }
}

function startWave() {
  if (waveActive) return;
  waveActive = true;
  pendingWave = false;
  waveSent = true;
  spawnQueue = [];
  const wave = generateWave(waveIndex);
  wave.forEach(g => {
    for (let i=0; i<g.count; i++) {
      spawnQueue.push({type:g.type, delay: i*g.interval});
    }
  });
  spawnTimer = 0;
  waveDelay = 2.0;
}

function createEnemy(type) {
  const waveSpeed = waveIndex + 1;
  const hpScale = 1 + waveIndex * 0.08;
  const c = ENEMIES[type];
  return {
    type, x:path[0].x, y:path[0].y, pathIdx:0,
    hp:c.hp*hpScale, maxHp:c.hp*hpScale, speed:waveSpeed, baseSpeed:waveSpeed,
    armor:c.armor||0, reward:c.reward, color:c.color, size:c.size,
    flying:c.flying||false, healRate:c.healRate||0,
    alive:true, reachedEnd:false, slowTimer:0, slowFactor:1, poisonTimer:0, poisonDmg:0
  };
}

function fireTower(t) {
  const c = TOWERS[t.type];
  let target = null, bestD = Infinity;
  enemies.forEach(e => {
    if (!e.alive) return;
    const d = dist(t, e);
    if (d <= c.range && d < bestD) { target = e; bestD = d; }
  });
  if (!target) return null;
  t.angle = Math.atan2(target.y-t.y, target.x-t.x);
  if (c.laser) {
    return { type:'laser', x1:t.x, y1:t.y, x2:target.x, y2:target.y, target, dmg:c.dmg, color:c.color, life:0.1 };
  }
  projectiles.push({
    x:t.x, y:t.y, target, dmg:c.dmg, speed:8,
    splash:c.splash||0, slow:c.slow||0, dot:c.dot||0,
    color:c.color, alive:true, trail:[]
  });
  return null;
}

function update(dt) {
  if (state !== 'playing') return;

  if (waveDelay > 0) { waveDelay -= dt; return; }

  if (waveActive) {
    spawnTimer += dt;
    const remaining = [];
    spawnQueue.forEach(s => {
      if (s.delay <= spawnTimer) {
        enemies.push(createEnemy(s.type));
      } else remaining.push(s);
    });
    spawnQueue = remaining;
    if (spawnQueue.length === 0) waveActive = false;
  }

  enemies.forEach(e => {
    if (!e.alive) return;
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      if (e.slowTimer <= 0) { e.slowTimer = 0; e.slowFactor = 1; e.speed = e.baseSpeed; }
    }
    if (e.poisonTimer > 0) {
      e.poisonTimer -= dt;
      e.hp -= e.poisonDmg * dt;
      if (e.hp <= 0) { e.hp = 0; e.alive = false; addParticles(e.x, e.y, '#88cc00', 4); }
    }
    if (e.healRate > 0) {
      enemies.forEach(o => {
        if (o !== e && o.alive && dist(e,o) <= 2) {
          o.hp = Math.min(o.maxHp, o.hp + e.healRate * dt);
        }
      });
    }
    if (e.pathIdx >= path.length) { e.reachedEnd = true; e.alive = false; return; }
    const target = path[e.pathIdx];
    const dx = target.x-e.x, dy = target.y-e.y;
    const d = Math.hypot(dx,dy);
    const move = e.speed * e.slowFactor * dt;
    if (d <= move) { e.x=target.x; e.y=target.y; e.pathIdx++; }
    else { e.x += dx/d*move; e.y += dy/d*move; }
  });

  enemies.forEach(e => {
    if (!e.alive && e.hp <= 0) addParticles(e.x, e.y, e.color, 12);
  });

  enemies.forEach(e => {
    if (e.alive && e.reachedEnd) { lives--; e.alive = false; }
  });

  towers.forEach(t => {
    t.cooldown = Math.max(0, t.cooldown - dt);
    if (t.cooldown <= 0) {
      const laser = fireTower(t);
      if (laser) lasers.push(laser);
      t.cooldown = TOWERS[t.type].rate;
    }
  });

  lasers.forEach(l => {
    l.life -= dt;
    if (l.target && l.target.alive) {
      l.x2 = l.target.x; l.y2 = l.target.y;
      l.target.hp -= l.dmg * dt * 60;
      if (l.target.hp <= 0) { l.target.hp = 0; l.target.alive = false; addParticles(l.target.x, l.target.y, l.target.color, 8); }
    }
  });
  lasers = lasers.filter(l => l.life > 0);

  projectiles.forEach(p => {
    if (!p.alive || !p.target || !p.target.alive) { p.alive=false; return; }
    p.trail.push({x:p.x,y:p.y});
    if (p.trail.length > 5) p.trail.shift();
    const dx=p.target.x-p.x, dy=p.target.y-p.y;
    const d=Math.hypot(dx,dy);
    const move=p.speed*dt;
    if (d<=move) {
      p.target.hp -= Math.max(1, p.dmg - p.target.armor);
      if (p.target.hp<=0) { p.target.hp=0; p.target.alive=false; }
      if (p.slow>0) { p.target.slowFactor=Math.min(p.target.slowFactor,p.slow); p.target.slowTimer=2; p.target.speed=p.target.baseSpeed*p.target.slowFactor; }
      if (p.dot>0) { p.target.poisonDmg=p.dot; p.target.poisonTimer=3; }
      if (p.splash>0) {
        enemies.forEach(e => {
          if (e!==p.target && e.alive && dist(p,e)<=p.splash) {
            e.hp -= Math.max(1, p.dmg*0.5 - e.armor);
            if(e.hp<=0){e.hp=0;e.alive=false;}
          }
        });
      }
      addParticles(p.target.x, p.target.y, p.target.color, 4);
      p.alive=false;
    } else {
      p.x+=dx/d*move; p.y+=dy/d*move;
    }
  });

  enemies = enemies.filter(e => e.alive);
  projectiles = projectiles.filter(p => p.alive);

  particles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.95; p.vy*=0.95; p.life-=dt; });
  particles = particles.filter(p => p.life>0);

  if (waveSent && !waveActive && pendingWave) {
    pendingWave = false;
    gold += 100;
    waveIndex++;
  }

  if (waveSent && !waveActive && !pendingWave && spawnQueue.length === 0 && enemies.length === 0) {
    pendingWave = true;
  }

  if (lives<=0) { state='gameover'; }
}

function drawGrid() {
  for (let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) {
    const t=grid[y][x];
    const colors = ['#327832','#a08c64','#c83c3c','#3c3ca0','#2850a0'];
    ctx.fillStyle = colors[t]||'#327832';
    ctx.fillRect(x*TILE, y*TILE, TILE, TILE);
    ctx.strokeStyle='#282832'; ctx.lineWidth=1;
    ctx.strokeRect(x*TILE, y*TILE, TILE, TILE);
  }
}

function drawTowers() {
  towers.forEach(t => {
    const c=TOWERS[t.type], sx=t.x*TILE, sy=t.y*TILE;
    ctx.fillStyle=c.color;
    if (c.laser) {
      ctx.beginPath(); ctx.arc(sx,sy,TILE*0.35,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
    } else {
      ctx.beginPath();
      for(let i=0;i<4;i++){
        const a=(t.angle||0)+Math.PI/2*i;
        const px=sx+Math.cos(a)*TILE*0.7*0.5, py=sy+Math.sin(a)*TILE*0.7*0.5;
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.lineTo(sx+Math.cos(t.angle||0)*TILE*0.4, sy+Math.sin(t.angle||0)*TILE*0.4);
      ctx.strokeStyle=c.color; ctx.lineWidth=3; ctx.stroke();
    }
  });
}

function drawEnemies() {
  enemies.forEach(e => {
    if(!e.alive) return;
    const sx=e.x*TILE, sy=e.y*TILE, r=TILE*e.size;
    ctx.fillStyle=e.color;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
    if(e.slowTimer>0){ctx.strokeStyle='#64c8ff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,r+2,0,Math.PI*2);ctx.stroke();}
    if(e.poisonTimer>0){ctx.strokeStyle='#88cc00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,r+3,0,Math.PI*2);ctx.stroke();}
    const bw=TILE*0.8, bh=4, bx=sx-bw/2, by=sy-r-bh-2;
    ctx.fillStyle='#c83232'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#32c832'; ctx.fillRect(bx,by,bw*Math.max(0,e.hp/e.maxHp),bh);
  });
}

function drawLasers() {
  lasers.forEach(l => {
    const x1=l.x1*TILE, y1=l.y1*TILE, x2=l.x2*TILE, y2=l.y2*TILE;
    ctx.strokeStyle='#66aaff'; ctx.lineWidth=3; ctx.shadowColor='#66aaff'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.strokeStyle='white'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.shadowBlur=0;
  });
}

function drawProjectiles() {
  projectiles.forEach(p => {
    if(!p.alive) return;
    p.trail.forEach((t,i) => {
      ctx.fillStyle=`rgba(180,150,50,${i/p.trail.length*0.5})`;
      ctx.beginPath(); ctx.arc(t.x*TILE,t.y*TILE,2,0,Math.PI*2); ctx.fill();
    });
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x*TILE,p.y*TILE,3,0,Math.PI*2); ctx.fill();
  });
}

function drawParticles() {
  particles.forEach(p => {
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x*TILE,p.y*TILE,p.size*a,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawUI() {
  ctx.fillStyle='#14141e';
  ctx.fillRect(0,H-UI_H,W,UI_H);
  ctx.strokeStyle='#505064'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,H-UI_H); ctx.lineTo(W,H-UI_H); ctx.stroke();

  ctx.font='bold 20px Arial'; ctx.fillStyle='#ffd700';
  ctx.fillText(`$${gold}`, 15, 30);
  ctx.fillStyle='#dc3232';
  ctx.fillText(`Lives: ${lives}`, 120, 30);
  ctx.fillStyle='white';
  ctx.font='16px Arial';
  ctx.fillText(`Level ${waveIndex+1}`, 280, 28);

  if (!waveActive) {
    ctx.fillStyle='#66ff66';
    ctx.fillText('[SPACE] Send Wave', 430, 28);
  }

  const types = Object.keys(TOWERS);
  const btnW = 70, gap = 5, startX = 15;
  types.forEach((type,i) => {
    const c=TOWERS[type], bx=startX+i*(btnW+gap), by=H-UI_H+10, bh=60;
    const sel=selectedType===type;
    ctx.fillStyle=sel?'#505078':'#3c3c50';
    ctx.beginPath(); ctx.roundRect(bx,by,btnW,bh,4); ctx.fill();
    ctx.strokeStyle=sel?'#a0a0ff':'#505064'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(bx,by,btnW,bh,4); ctx.stroke();
    ctx.fillStyle='white'; ctx.font='10px Arial';
    ctx.fillText(c.name, bx+3, by+13);
    ctx.fillStyle='#ffd700';
    ctx.fillText(`$${c.cost}`, bx+3, by+26);
    ctx.fillStyle=c.color;
    ctx.beginPath(); ctx.arc(bx+btnW/2, by+42, 7, 0, Math.PI*2); ctx.fill();
  });

  const trashX = W - 50, trashY = H - UI_H + 15;
  ctx.fillStyle='#555';
  ctx.beginPath(); ctx.roundRect(trashX, trashY, 35, 35, 4); ctx.fill();
  ctx.strokeStyle='#888'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(trashX, trashY, 35, 35, 4); ctx.stroke();
  ctx.fillStyle='#ff4444'; ctx.font='20px Arial';
  ctx.fillText('\u2716', trashX+8, trashY+25);
}

function drawMenu() {
  ctx.fillStyle='#1e1e28'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 52px Arial'; ctx.fillStyle='#ffd700';
  ctx.fillText('TOWER DEFENSE', W/2, H/3-20);
  ctx.font='24px Arial'; ctx.fillStyle='#aaaaaa';
  ctx.fillText('A strategy tower defense game', W/2, H/3+25);
  ctx.font='20px Arial'; ctx.fillStyle='white';
  ctx.fillText('Click anywhere or press SPACE to start', W/2, H/2+20);
  ctx.font='14px Arial'; ctx.fillStyle='#808080';
  const tips=[
    'Click tower buttons at the bottom to select',
    'Click green grass tiles to place towers',
    'Right-click a tower to sell it (50% refund)',
    'Press SPACE to send each wave',
    'Enemies follow the brown path',
    'Don\'t let them reach the blue tile!'
  ];
  tips.forEach((t,i) => ctx.fillText(t, W/2, H/2+60+i*22));
  ctx.textAlign='left';
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 52px Arial'; ctx.fillStyle='#dc3232';
  ctx.fillText('GAME OVER', W/2, H/2-40);
  ctx.font='24px Arial'; ctx.fillStyle='#ffd700';
  ctx.fillText(`Reached Level ${waveIndex+1}`, W/2, H/2+5);
  ctx.font='20px Arial'; ctx.fillStyle='white';
  ctx.fillText('Click or press SPACE to restart', W/2, H/2+40);
  ctx.textAlign='left';
}

function drawHover() {
  if (!selectedType) return;
  if (mouseY >= H-UI_H) return;
  const tx=Math.floor(mouseX/TILE), ty=Math.floor(mouseY/TILE);
  if (canPlace(tx,ty)) {
    const c=TOWERS[selectedType];
    ctx.strokeStyle='rgba(100,255,100,0.5)'; ctx.lineWidth=2;
    ctx.strokeRect(tx*TILE,ty*TILE,TILE,TILE);
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.arc(tx*TILE+TILE/2,ty*TILE+TILE/2,c.range*TILE,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(tx*TILE+TILE/2,ty*TILE+TILE/2,c.range*TILE,0,Math.PI*2); ctx.stroke();
  }
}

function drawTooltip() {
  if (!selectedType || mouseY >= H-UI_H) return;
  const c = TOWERS[selectedType];
  const lines = [c.name, `Cost: $${c.cost}`, `Dmg: ${c.dmg}`, `Range: ${c.range}`, `Rate: ${c.rate}s`];
  if (c.splash) lines.push(`Splash: ${c.splash}`);
  if (c.slow) lines.push(`Slow: ${Math.round(c.slow*100)}%`);
  if (c.dot) lines.push(`Poison: ${c.dot}/s`);
  if (c.laser) lines.push('Continuous beam');
  const bw=130, lh=16, bh=lines.length*lh+10;
  let bx=mouseX+15, by=mouseY-bh/2;
  if (bx+bw>W) bx=mouseX-bw-15;
  if (by+bh>H-UI_H) by=H-UI_H-bh;
  ctx.fillStyle='rgba(20,20,30,0.92)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,4); ctx.fill();
  ctx.strokeStyle='#505064'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,4); ctx.stroke();
  lines.forEach((l,i) => {
    ctx.fillStyle=i===0?'#ffd700':'#cccccc';
    ctx.font=i===0?'bold 12px Arial':'11px Arial';
    ctx.fillText(l, bx+5, by+12+i*lh);
  });
}

function draw() {
  ctx.fillStyle='#1e1e28'; ctx.fillRect(0,0,W,H);
  if (state==='menu') { drawMenu(); return; }
  drawGrid(); drawHover(); drawTowers(); drawLasers(); drawEnemies(); drawProjectiles(); drawParticles(); drawUI();
  drawTooltip();
  if (state==='gameover') drawGameOver();
}

let mouseX=0, mouseY=0;

canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
  mouseY=(e.clientY-r.top)*(H/r.height);
});

function fullReset() {
  gold=150; lives=20; towers=[]; enemies=[]; projectiles=[]; particles=[]; lasers=[];
  waveIndex=0; waveActive=false; spawnQueue=[]; spawnTimer=0; waveDelay=0; pendingWave=false; waveSent=false;
  resetGrid();
  state='playing';
}

canvas.addEventListener('click', e => {
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);

  if (state==='menu') { fullReset(); return; }
  if (state==='gameover') { fullReset(); return; }

  if (my >= H-UI_H) {
    const trashX = W-50, trashY = H-UI_H+15;
    if (mx>=trashX && mx<=trashX+35 && my>=trashY && my<=trashY+35) {
      fullReset();
      return;
    }
    const types=Object.keys(TOWERS);
    const btnW=70, gap=5, startX=15;
    types.forEach((type,i) => {
      if (mx>=startX+i*(btnW+gap) && mx<=startX+i*(btnW+gap)+btnW && my>=H-UI_H+10 && my<=H-UI_H+70) {
        selectedType = selectedType===type ? null : type;
      }
    });
    return;
  }

  const tx=Math.floor(mx/TILE), ty=Math.floor(my/TILE);
  if (selectedType) {
    if (canPlace(tx,ty) && gold>=TOWERS[selectedType].cost) {
      gold-=TOWERS[selectedType].cost;
      grid[ty][tx]=5;
      towers.push({x:tx+0.5, y:ty+0.5, type:selectedType, tx, ty, cooldown:0, angle:0});
    }
  } else {
    const idx = towers.findIndex(t=>t.tx===tx&&t.ty===ty);
    if (idx>=0) {
      const t=towers[idx];
      gold+=Math.floor(TOWERS[t.type].cost/2);
      grid[ty][tx]=0;
      towers.splice(idx,1);
    }
  }
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  if (my>=H-UI_H) return;
  const tx=Math.floor(mx/TILE), ty=Math.floor(my/TILE);
  const idx = towers.findIndex(t=>t.tx===tx&&t.ty===ty);
  if (idx>=0) {
    const t=towers[idx];
    gold+=Math.floor(TOWERS[t.type].cost/2);
    grid[ty][tx]=0;
    towers.splice(idx,1);
  }
});

document.addEventListener('keydown', e => {
  if (e.code==='Space') {
    e.preventDefault();
    if (state==='menu') { fullReset(); return; }
    if (state==='gameover') { fullReset(); return; }
    if (state==='playing' && !waveActive) startWave();
  }
  if (e.code==='Escape') selectedType=null;
});

let lastTime=0;
function loop(time) {
  const dt=Math.min((time-lastTime)/1000, 0.05);
  lastTime=time;
  update(dt); draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
