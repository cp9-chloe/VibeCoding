<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Projects</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #2563eb);
        color: #fff;
      }

      .card {
        width: min(90vw, 560px);
        padding: 28px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
        text-align: center;
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
      }

      .links {
        list-style: none;
        padding: 0;
        margin: 20px 0 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .link-btn {
        display: block;
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 999px;
        background: #ffffff22;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
      }

      .link-btn:hover {
        transform: translateY(-2px) scale(1.01);
        background: #ffffff33;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Open Projects</h1>
      <p>These links open in a new browser window.</p>
      <ul id="project-links" class="links"></ul>
    </div>

    <script>
      const projects = [
        { name: 'Web', url: 'web/simple-web/' },
        { name: 'Web 2', url: 'web2/' }
      ];

      const list = document.getElementById('project-links');

      projects.forEach((project, index) => {
        const item = document.createElement('li');
        const button = document.createElement('button');
        button.className = 'link-btn';
        button.textContent = `Open ${project.name}`;

        button.addEventListener('click', () => {
          window.location.href = project.url;
        });

        button.style.animationDelay = `${index * 0.1}s`;
        item.appendChild(button);
        list.appendChild(item);
      });
    </script>
  </body>
</html>
